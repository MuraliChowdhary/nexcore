services:
  # ─── Databases ───────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: nexcore_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  project-db:
    image: postgres:16-alpine
    container_name: nexcore_project_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - project_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-db:
    image: postgres:16-alpine
    container_name: nexcore_chat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - chat_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexcore_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Services ────────────────────────────────────────────
  auth-service:
    build:
      context: ./apps/auth-service   # ← points directly to service folder
      dockerfile: Dockerfile
    container_name: nexcore_auth_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@auth-db:5432/auth_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: nexcore_super_secret_change_in_prod
      PORT: 3001
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  project-service:
    build:
      context: ./apps/project-service  # ← points directly to service folder
      dockerfile: Dockerfile
    container_name: nexcore_project_service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@project-db:5432/project_db
      REDIS_URL: redis://redis:6379
      PORT: 3002
    depends_on:
      project-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat-service:
    build:
      context: ./apps/chat-service     # ← points directly to service folder
      dockerfile: Dockerfile
    container_name: nexcore_chat_service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@chat-db:5432/chat_db
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:3010
      PORT: 3003
    depends_on:
      chat-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ./apps/gateway          # ← points directly to service folder
      dockerfile: Dockerfile
    container_name: nexcore_gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      PROJECT_SERVICE_URL: http://project-service:3002
      CHAT_SERVICE_URL: http://chat-service:3003
      JWT_SECRET: nexcore_super_secret_change_in_prod
      CLIENT_URL: http://localhost:3010
      PORT: 3000
    depends_on:
      - auth-service
      - project-service
      - chat-service

volumes:
  auth_db_data:
  project_db_data:
  chat_db_data:
  redis_data: